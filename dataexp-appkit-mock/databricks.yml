bundle:
  name: dataexp-appkit-mock

variables:
  sql_warehouse_id:
    description: SQL Warehouse ID

resources:
  apps:
    app:
      name: "dataexp-appkit-mock"
      description: "Cosmo 顧客データエクスポートアプリ"
      source_code_path: ./
      # Uncomment to enable on behalf of user API scopes. Available scopes: sql, dashboards.genie, files.files, serving.serving-endpoints
      # user_api_scopes:
      #   - sql

      # The resources which this app has access to.
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE

targets:
  default:
    default: true
    workspace:
      host: https://adb-5493806192611194.14.azuredatabricks.net

    variables:
      sql_warehouse_id: 847899920da20103
